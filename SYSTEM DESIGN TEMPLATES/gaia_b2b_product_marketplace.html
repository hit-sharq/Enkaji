
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap');

  :root {
    --gold: #c8b96a;
    --gold-dim: rgba(200,185,106,0.18);
    --gold-border: rgba(200,185,106,0.28);
    --dark: #0d1a12;
    --dark-2: #162a1a;
    --cream: #f0e8d4;
    --cream-dim: rgba(240,232,212,0.6);
    --cream-muted: rgba(240,232,212,0.35);
  }

  .g-shell { background: var(--dark); font-family: 'Inter', sans-serif; color: var(--cream); }

  .g-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 0.5px solid var(--gold-border); }
  .g-logo { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; letter-spacing: 2.5px; color: var(--gold); }
  .g-nav-right { display: flex; align-items: center; gap: 16px; }
  .g-search { background: rgba(255,255,255,0.05); border: 0.5px solid var(--gold-border); color: var(--cream); font-size: 12px; padding: 7px 12px; outline: none; width: 180px; font-family: 'Inter', sans-serif; }
  .g-search::placeholder { color: var(--cream-muted); }
  .g-cart-btn { background: var(--gold); color: var(--dark); font-size: 11px; letter-spacing: 1.5px; padding: 7px 14px; border: none; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .g-cart-count { background: var(--dark); color: var(--gold); font-size: 10px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; }

  .g-cats { display: flex; gap: 0; border-bottom: 0.5px solid var(--gold-border); padding: 0 24px; overflow-x: auto; }
  .g-cat { font-size: 11px; letter-spacing: 1.5px; padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--cream-muted); white-space: nowrap; }
  .g-cat.active { border-bottom-color: var(--gold); color: var(--gold); }
  .g-cat:hover { color: var(--cream-dim); }

  .g-body { display: grid; grid-template-columns: 180px 1fr; min-height: 520px; }
  .g-sidebar { border-right: 0.5px solid var(--gold-border); padding: 20px 16px; }
  .g-filter-title { font-size: 10px; letter-spacing: 2px; color: var(--gold); margin-bottom: 12px; }
  .g-filter-group { margin-bottom: 20px; }
  .g-filter-label { font-size: 11px; color: var(--cream-muted); margin-bottom: 8px; }
  .g-filter-option { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--cream-dim); padding: 4px 0; cursor: pointer; }
  .g-check { width: 13px; height: 13px; border: 0.5px solid var(--gold-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; color: var(--gold); }
  .g-check.on { background: var(--gold-dim); border-color: var(--gold); }
  .g-divider { height: 0.5px; background: var(--gold-border); margin: 12px 0; }

  .g-main { padding: 20px 24px; }
  .g-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .g-result-count { font-size: 12px; color: var(--cream-muted); }
  .g-sort { background: rgba(255,255,255,0.04); border: 0.5px solid var(--gold-border); color: var(--cream-dim); font-size: 12px; padding: 6px 10px; font-family: 'Inter', sans-serif; }

  .g-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .g-card { background: rgba(255,255,255,0.03); border: 0.5px solid var(--gold-border); cursor: pointer; transition: border-color 0.15s; }
  .g-card:hover { border-color: rgba(200,185,106,0.55); }
  .g-card.selected { border: 1.5px solid var(--gold); }
  .g-card-img { height: 90px; background: var(--dark-2); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 30px; border-bottom: 0.5px solid var(--gold-border); }
  .g-card-body { padding: 12px; }
  .g-card-cat { font-size: 10px; letter-spacing: 1.5px; color: var(--cream-muted); margin-bottom: 4px; }
  .g-card-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--cream); margin-bottom: 6px; line-height: 1.3; }
  .g-card-price { font-size: 14px; font-weight: 500; color: var(--gold); }
  .g-card-unit { font-size: 10px; color: var(--cream-muted); font-weight: 400; }
  .g-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 0.5px solid rgba(200,185,106,0.12); }
  .g-badge { font-size: 10px; padding: 2px 7px; }
  .g-badge.avail { background: rgba(29,158,117,0.15); color: #5dcaa5; border: 0.5px solid rgba(29,158,117,0.25); }
  .g-badge.low { background: rgba(239,159,39,0.12); color: #ef9f27; border: 0.5px solid rgba(239,159,39,0.25); }
  .g-badge.oos { background: rgba(226,75,74,0.1); color: #f09595; border: 0.5px solid rgba(226,75,74,0.2); }
  .g-moq { font-size: 10px; color: var(--cream-muted); }

  .g-detail { border-top: 0.5px solid var(--gold-border); }
  .g-detail-inner { display: grid; grid-template-columns: 1fr 1fr; }
  .g-detail-left { padding: 24px; border-right: 0.5px solid var(--gold-border); }
  .g-detail-right { padding: 24px; }
  .g-detail-eyebrow { font-size: 10px; letter-spacing: 2.5px; color: var(--gold); margin-bottom: 6px; }
  .g-detail-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: var(--cream); margin-bottom: 8px; }
  .g-detail-desc { font-size: 12px; color: var(--cream-dim); line-height: 1.7; margin-bottom: 16px; }
  .g-spec-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid rgba(200,185,106,0.1); font-size: 12px; }
  .g-spec-k { color: var(--cream-muted); }
  .g-spec-v { color: var(--cream); font-weight: 500; }
  .g-pricing-box { background: rgba(200,185,106,0.06); border: 0.5px solid var(--gold-border); padding: 14px; margin-bottom: 14px; }
  .g-tier-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; }
  .g-tier-label { color: var(--cream-muted); }
  .g-tier-price { color: var(--cream); font-weight: 500; }
  .g-tier-price.best { color: var(--gold); }
  .g-action-row { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .g-btn-gold { background: var(--gold); color: var(--dark); font-size: 11px; letter-spacing: 1.5px; padding: 11px 18px; border: none; cursor: pointer; font-weight: 500; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .g-btn-ghost { background: transparent; color: var(--cream-dim); font-size: 11px; letter-spacing: 1px; padding: 11px 18px; border: 0.5px solid var(--gold-border); cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .g-btn-ghost:hover { border-color: rgba(200,185,106,0.5); color: var(--cream); }
  .g-supplier { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-top: 0.5px solid rgba(200,185,106,0.12); margin-top: 12px; }
  .g-sup-avatar { width: 34px; height: 34px; border: 0.5px solid var(--gold-border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--gold); flex-shrink: 0; }
  .g-sup-name { font-size: 13px; color: var(--cream); }
  .g-sup-meta { font-size: 11px; color: var(--cream-muted); }
  .g-star { color: var(--gold); font-size: 11px; }

  .g-toast { background: var(--dark-2); border: 0.5px solid var(--gold); color: var(--gold); font-size: 12px; letter-spacing: 1px; padding: 10px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .g-toast-hidden { display: none; }
</style>

<div class="g-shell">
  <h2 class="sr-only">Gaia B2B product marketplace with filterable product grid and detail panel</h2>

  <nav class="g-nav">
    <div class="g-logo">GAIA MARKET</div>
    <div class="g-nav-right">
      <input class="g-search" type="text" placeholder="Search products..." id="searchInput" oninput="filterProducts()" />
      <button class="g-cart-btn" onclick="showToast()">
        <i class="ti ti-shopping-cart" style="font-size:14px" aria-hidden="true"></i>
        Cart <span class="g-cart-count" id="cartCount">0</span>
      </button>
    </div>
  </nav>

  <div class="g-cats" id="catBar"></div>

  <div class="g-body">
    <aside class="g-sidebar">
      <div class="g-filter-title">Filter</div>

      <div class="g-filter-group">
        <div class="g-filter-label">Availability</div>
        <div class="g-filter-option" onclick="toggleFilter('avail','In stock')">
          <div class="g-check on" id="f-avail"><i class="ti ti-check" style="font-size:9px" aria-hidden="true"></i></div>
          <span>In stock</span>
        </div>
        <div class="g-filter-option" onclick="toggleFilter('low','Low stock')">
          <div class="g-check on" id="f-low"><i class="ti ti-check" style="font-size:9px" aria-hidden="true"></i></div>
          <span>Low stock</span>
        </div>
        <div class="g-filter-option" onclick="toggleFilter('oos','Out of stock')">
          <div class="g-check" id="f-oos"></div>
          <span>Out of stock</span>
        </div>
      </div>

      <div class="g-divider"></div>

      <div class="g-filter-group">
        <div class="g-filter-label">Min. order</div>
        <div class="g-filter-option"><div class="g-check on"><i class="ti ti-check" style="font-size:9px" aria-hidden="true"></i></div><span>Any quantity</span></div>
        <div class="g-filter-option"><div class="g-check"></div><span>Under 50 units</span></div>
        <div class="g-filter-option"><div class="g-check"></div><span>50–500 units</span></div>
      </div>

      <div class="g-divider"></div>

      <div class="g-filter-group">
        <div class="g-filter-label">Origin</div>
        <div class="g-filter-option"><div class="g-check on"><i class="ti ti-check" style="font-size:9px" aria-hidden="true"></i></div><span>All regions</span></div>
        <div class="g-filter-option"><div class="g-check"></div><span>Europe</span></div>
        <div class="g-filter-option"><div class="g-check"></div><span>Asia Pacific</span></div>
        <div class="g-filter-option"><div class="g-check"></div><span>East Africa</span></div>
      </div>
    </aside>

    <div class="g-main">
      <div id="toast" class="g-toast g-toast-hidden">
        <i class="ti ti-check" style="font-size:14px" aria-hidden="true"></i>
        Item added to cart
      </div>
      <div class="g-toolbar">
        <div class="g-result-count" id="resultCount">6 products</div>
        <select class="g-sort" onchange="sortProducts(this.value)">
          <option value="default">Sort: Featured</option>
          <option value="price-asc">Price: Low to high</option>
          <option value="price-desc">Price: High to low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div class="g-grid" id="productGrid"></div>
      <div class="g-detail" id="detailPanel"></div>
    </div>
  </div>
</div>

<script>
const allProducts = [
  { id:1, icon:"ti-leaf", cat:"Botanicals", name:"Cold-pressed moringa oil", price:18.50, unit:"/ 250ml bottle", status:"avail", statusLabel:"In stock", moq:"100 btl", sku:"MOR-250-CP", lead:"3–5 days", origin:"Kenya", warranty:"18 months", supplier:"GreenRoots Ltd", supInit:"GR", rating:4.9, reviews:214, desc:"100% pure cold-pressed moringa seed oil, food-grade certified. Ideal for nutraceutical, cosmetic, and culinary B2B buyers.", tiers:[{l:"100–499 btl",p:"$18.50"},{l:"500–1999 btl",p:"$15.80"},{l:"2000+ btl",p:"$12.40",best:true}] },
  { id:2, icon:"ti-flask", cat:"Extracts", name:"Baobab fruit powder", price:9.20, unit:"/ kg", status:"avail", statusLabel:"In stock", moq:"50 kg", sku:"BAO-PWD-1K", lead:"5–7 days", origin:"Tanzania", warranty:"24 months", supplier:"Savanna Source", supInit:"SS", rating:4.7, reviews:189, desc:"Spray-dried baobab pulp powder, non-GMO and organically cultivated. Rich in Vitamin C, ideal for food and supplement manufacturers.", tiers:[{l:"50–199 kg",p:"$9.20"},{l:"200–999 kg",p:"$7.60"},{l:"1000+ kg",p:"$5.95",best:true}] },
  { id:3, icon:"ti-droplet", cat:"Essential oils", name:"Sandalwood essential oil", price:148.00, unit:"/ 100ml", status:"low", statusLabel:"Low stock", moq:"10 btl", sku:"SAN-EO-100", lead:"7–10 days", origin:"Uganda", warranty:"36 months", supplier:"ArborScent Co.", supInit:"AC", rating:4.8, reviews:97, desc:"Steam-distilled East African sandalwood oil, sustainably harvested. Premium grade for fragrance houses and wellness product lines.", tiers:[{l:"10–49 btl",p:"$148.00"},{l:"50–199 btl",p:"$128.00"},{l:"200+ btl",p:"$105.00",best:true}] },
  { id:4, icon:"ti-plant", cat:"Botanicals", name:"Spirulina biomass powder", price:32.00, unit:"/ kg", status:"avail", statusLabel:"In stock", moq:"25 kg", sku:"SPI-BIO-1K", lead:"4–6 days", origin:"Kenya", warranty:"18 months", supplier:"AquaFarm Ltd", supInit:"AF", rating:4.6, reviews:311, desc:"High-protein spirulina biomass (65% protein content), suitable for nutraceutical tablets, protein powders, and aquafeed industries.", tiers:[{l:"25–99 kg",p:"$32.00"},{l:"100–499 kg",p:"$27.50"},{l:"500+ kg",p:"$22.00",best:true}] },
  { id:5, icon:"ti-grain", cat:"Grains & seeds", name:"Black sesame seed, hulled", price:4.80, unit:"/ kg", status:"avail", statusLabel:"In stock", moq:"500 kg", sku:"SES-BLK-H", lead:"10–12 days", origin:"Ethiopia", warranty:"12 months", supplier:"HornHarvest", supInit:"HH", rating:4.5, reviews:402, desc:"Machine-cleaned, hulled black sesame seeds with <0.1% impurity rate. Suitable for food processing, bakery, and oil extraction at scale.", tiers:[{l:"500–1999 kg",p:"$4.80"},{l:"2000–9999 kg",p:"$4.10"},{l:"10,000+ kg",p:"$3.50",best:true}] },
  { id:6, icon:"ti-bottle", cat:"Extracts", name:"Aloe vera gel concentrate", price:22.00, unit:"/ litre", status:"oos", statusLabel:"Out of stock", moq:"200 L", sku:"ALO-GEL-1L", lead:"3–4 weeks", origin:"Kenya", warranty:"12 months", supplier:"SunshineGel Inc.", supInit:"SG", rating:4.4, reviews:158, desc:"200x cold-stabilised aloe vera gel concentrate, cosmetic and food grade. Low sugar, high acemannan content for skincare and beverage applications.", tiers:[{l:"200–499 L",p:"$22.00"},{l:"500–1999 L",p:"$18.50"},{l:"2000+ L",p:"$14.80",best:true}] },
];

const cats = ["All", "Botanicals", "Extracts", "Essential oils", "Grains & seeds"];
let activeFilters = { avail: true, low: true, oos: false };
let activeCat = "All";
let activeProduct = 0;
let cartCount = 0;
let toastTimer = null;

function renderCats() {
  document.getElementById('catBar').innerHTML = cats.map(c =>
    `<div class="g-cat ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</div>`
  ).join('');
}

function setCat(c) { activeCat = c; render(); }

function toggleFilter(key) {
  activeFilters[key] = !activeFilters[key];
  const el = document.getElementById('f-'+key);
  if (activeFilters[key]) {
    el.className = 'g-check on';
    el.innerHTML = '<i class="ti ti-check" style="font-size:9px" aria-hidden="true"></i>';
  } else {
    el.className = 'g-check';
    el.innerHTML = '';
  }
  render();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return allProducts.filter(p => {
    if (activeCat !== 'All' && p.cat !== activeCat) return false;
    if (!activeFilters[p.status]) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.cat.toLowerCase().includes(q)) return false;
    return true;
  });
}

function filterProducts() { render(); }

function sortProducts(val) {
  if (val === 'price-asc') allProducts.sort((a,b) => a.price - b.price);
  else if (val === 'price-desc') allProducts.sort((a,b) => b.price - a.price);
  else if (val === 'name') allProducts.sort((a,b) => a.name.localeCompare(b.name));
  render();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.remove('g-toast-hidden');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('g-toast-hidden'), 2000);
}

function addToCart(id) {
  cartCount++;
  document.getElementById('cartCount').textContent = cartCount;
  showToast();
}

function selectProduct(id) {
  activeProduct = id;
  render();
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function render() {
  renderCats();
  const filtered = getFiltered();
  document.getElementById('resultCount').textContent = filtered.length + ' product' + (filtered.length !== 1 ? 's' : '');

  document.getElementById('productGrid').innerHTML = filtered.map(p => `
    <div class="g-card ${p.id===activeProduct?'selected':''}" onclick="selectProduct(${p.id})">
      <div class="g-card-img"><i class="ti ${p.icon}" aria-hidden="true"></i></div>
      <div class="g-card-body">
        <div class="g-card-cat">${p.cat.toUpperCase()}</div>
        <div class="g-card-name">${p.name}</div>
        <div class="g-card-price">$${p.price.toFixed(2)} <span class="g-card-unit">${p.unit}</span></div>
        <div class="g-card-footer">
          <span class="g-badge ${p.status}">${p.statusLabel}</span>
          <span class="g-moq">MOQ: ${p.moq}</span>
        </div>
      </div>
    </div>
  `).join('');

  if (activeProduct) {
    const p = allProducts.find(x => x.id === activeProduct);
    if (p) {
      document.getElementById('detailPanel').innerHTML = `
        <div class="g-detail-inner">
          <div class="g-detail-left">
            <div class="g-detail-eyebrow">${p.cat.toUpperCase()} · ${p.sku}</div>
            <div class="g-detail-name">${p.name}</div>
            <p class="g-detail-desc">${p.desc}</p>
            <div class="g-spec-row"><span class="g-spec-k">Lead time</span><span class="g-spec-v">${p.lead}</span></div>
            <div class="g-spec-row"><span class="g-spec-k">Min. order</span><span class="g-spec-v">${p.moq}</span></div>
            <div class="g-spec-row"><span class="g-spec-k">Country of origin</span><span class="g-spec-v">${p.origin}</span></div>
            <div class="g-spec-row"><span class="g-spec-k">Shelf life</span><span class="g-spec-v">${p.warranty}</span></div>
            <div class="g-spec-row"><span class="g-spec-k">Availability</span><span class="g-spec-v"><span class="g-badge ${p.status}" style="vertical-align:middle">${p.statusLabel}</span></span></div>
            <div class="g-supplier">
              <div class="g-sup-avatar">${p.supInit}</div>
              <div>
                <div class="g-sup-name">${p.supplier}</div>
                <div class="g-sup-meta"><span class="g-star">★★★★★</span> ${p.rating} · ${p.reviews} reviews</div>
              </div>
            </div>
          </div>
          <div class="g-detail-right">
            <div class="g-detail-eyebrow">Volume pricing</div>
            <div class="g-pricing-box">
              ${p.tiers.map(t => `
                <div class="g-tier-row">
                  <span class="g-tier-label">${t.l}</span>
                  <span class="g-tier-price ${t.best?'best':''}">${t.p}</span>
                </div>
              `).join('')}
            </div>
            <div style="font-size:11px; color:var(--cream-muted); margin-bottom:14px;">Prices exclude VAT, shipping, and customs duties. Contact supplier for bulk freight options.</div>
            <div class="g-action-row">
              <button class="g-btn-gold" onclick="addToCart(${p.id})">
                <i class="ti ti-shopping-cart" style="font-size:14px" aria-hidden="true"></i>
                Add to cart
              </button>
              <button class="g-btn-ghost">
                <i class="ti ti-file-text" style="font-size:14px" aria-hidden="true"></i>
                Request a quote
              </button>
              <button class="g-btn-ghost">
                <i class="ti ti-message" style="font-size:14px" aria-hidden="true"></i>
                Contact supplier
              </button>
              <button class="g-btn-ghost">
                <i class="ti ti-download" style="font-size:14px" aria-hidden="true"></i>
                Download spec sheet
              </button>
            </div>
          </div>
        </div>
      `;
    }
  } else {
    document.getElementById('detailPanel').innerHTML = '';
  }
}

render();
</script>
