name: Sync Mobile Version to Vercel

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest mobile build info from EAS
        id: eas
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          npm install -g eas-cli
          BUILD_DATA=$(eas build:list --profile production --limit 1 --json)
          echo "$BUILD_DATA" > build.json
          ANDROID_VERSION=$(python3 -c "import json; d=json.load(open('build.json')); print(d[0].get('androidVersion') if d and len(d)>0 and d[0].get('androidVersion') is not None else int(str(d[0].get('iosBuildNumber','1')).split('.')[0]) if d and len(d)>0 else 1)")
          APP_VERSION=$(python3 -c "import json; d=json.load(open('build.json')); print(d[0].get('appVersion') if d and len(d)>0 and d[0].get('appVersion') else '1.0.0')")
          echo "android_version=$ANDROID_VERSION" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Update Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          BUILD_NUMBER: ${{ steps.eas.outputs.android_version }}
          APP_VERSION: ${{ steps.eas.outputs.app_version }}
        run: |
          npm install -g vercel@latest
          set_env() {
            local key="$1"
            local value="$2"
            vercel env rm "$key" production --token "$VERCEL_TOKEN" --yes 2>/dev/null || true
            vercel env add "$key" "$value" --token "$VERCEL_TOKEN" --target production 2>/dev/null || \
            vercel env add "$key" "$value" --token "$VERCEL_TOKEN" --scope "$VERCEL_TEAM_ID" --target production
          }
          set_env "NEXT_PUBLIC_BUILD_NUMBER" "$BUILD_NUMBER"
          set_env "NEXT_PUBLIC_APP_VERSION" "$APP_VERSION"
          echo "Version sync complete."